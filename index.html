<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <title>QR Code Generator</title>
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1>QR Maker</h1>
        <p>Simple & Elegant QR Code Generator</p>
      </header>
      
      <main class="container">
        <!-- Input section -->
        <div class="glass-panel input-section">
          <input type="text" id="url-input" placeholder="URL 주소 또는 텍스트를 입력하세요" autocomplete="off" />
          <button id="generate-btn">생성하기</button>
        </div>
        
        <!-- Result section -->
        <div class="glass-panel result-section" id="result-box" style="display: none;">
          <div class="qr-container">
            <img id="qr-image" src="" alt="Generated QR Code" />
          </div>
          <p id="qr-text-display"></p>
          <button id="download-btn">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            이미지 저장
          </button>
        </div>
      </main>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
